name: Data Engineering CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Python lint)
        run: uv run ruff check .
      - name: Run SQLFluff (SQL lint)
        run: uv run sqlfluff lint airflow/dags/dbt_transform/us_flight_analytics/models --dialect athena


      - name: Test Docker Compose Build
        run: docker compose build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Validate
        working-directory: ./infra
        run: |
          terraform init -backend=false
          terraform validate

      - name: Check dbt syntax
        working-directory: ./airflow/dags/dbt_transform/us_flight_analytics
        env:
          S3_ATHENA_RESULT: "dir_athena"
          S3_BUCKET_FINAL_RESULT: "dir_athena"
          DATABASE_NAME: "db_name"
          AWS_ACCESS_KEY_ID: "dummy_access_key_for_ci_test"
          AWS_SECRET_ACCESS_KEY: "dummy_secret_key_for_ci_test"
        run: |
          source ../../../../.venv/bin/activate
          dbt deps
          dbt parse
          dbt compile
